<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar · Sertão Maker</title>
  <link rel="stylesheet" href="css/auth.css">
  <style>
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px;
      background: white;
      border: 2px solid #ddd;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-google:hover {
      border-color: #4285f4;
      box-shadow: 0 2px 8px rgba(66,133,244,0.2);
    }
    .btn-google img {
      width: 22px;
      height: 22px;
    }
    .divisor {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #aaa;
      font-size: 13px;
    }
    .divisor::before, .divisor::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-logo">
      <img src="assets/logo.jpg" alt="Sertão Maker">
    </div>

    <div class="auth-card">
      <h2>Bem-vindo ao Sertão Maker!</h2>
      <p class="sub">Entre com sua conta Google institucional para acessar e compartilhar projetos.</p>

      <div class="auth-error" id="erroGeral"></div>

      <button class="btn-google" id="btnGoogle" onclick="entrarComGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Entrar com Google
      </button>

      <div class="divisor">acesso restrito à instituição</div>

      <p style="font-size:12px;color:#999;text-align:center;line-height:1.6">
        Ao entrar, você concorda em usar o sistema apenas para fins acadêmicos e de pesquisa do Sertão Maker.
      </p>
    </div>
  </div>

  <script>
    async function verificarSessao() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (user) window.location.href = 'index.html';
    }
    verificarSessao();

    async function entrarComGoogle() {
      const btn = document.getElementById('btnGoogle');
      const erro = document.getElementById('erroGeral');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner" style="border-color:rgba(0,0,0,0.2);border-top-color:#333"></span>Redirecionando...';
      erro.classList.remove('show');
      try {
        await Auth.loginComGoogle();
      } catch (err) {
        erro.textContent = 'Erro ao conectar com Google. Tente novamente.';
        erro.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width:22px">Entrar com Google';
      }
    }
  </script>

</body>
</html>
