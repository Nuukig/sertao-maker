<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar · Sertão Maker</title>
  <link rel="stylesheet" href="css/auth.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-logo">
      <img src="assets/logo.jpg" alt="Sertão Maker">
    </div>

    <div class="auth-card">
      <h2>Bem-vindo de volta!</h2>
      <p class="sub">Entre com sua conta institucional para acessar os projetos.</p>

      <div class="auth-error" id="erroGeral"></div>

      <div class="form-group">
        <label>E-mail institucional</label>
        <input type="email" id="email" placeholder="seu@email.edu.br" autocomplete="email">
        <div class="field-error" id="erroEmail">E-mail inválido</div>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password">
        <div class="field-error" id="erroSenha">Senha obrigatória</div>
      </div>

      <button class="btn-auth" id="btnEntrar" onclick="fazerLogin()">Entrar</button>

      <div class="auth-link">
        Não tem conta? <a href="register.html">Criar conta</a>
      </div>
    </div>
  </div>

  <script>
    async function verificarSessao() {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (user) window.location.href = 'index.html';
    }
    verificarSessao();

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') fazerLogin();
    });

    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn = document.getElementById('btnEntrar');
      const erroGeral = document.getElementById('erroGeral');

      let valido = true;

      if (!email || !email.includes('@')) {
        document.getElementById('erroEmail').classList.add('show');
        document.getElementById('email').classList.add('error');
        valido = false;
      } else {
        document.getElementById('erroEmail').classList.remove('show');
        document.getElementById('email').classList.remove('error');
      }

      if (!senha) {
        document.getElementById('erroSenha').classList.add('show');
        document.getElementById('senha').classList.add('error');
        valido = false;
      } else {
        document.getElementById('erroSenha').classList.remove('show');
        document.getElementById('senha').classList.remove('error');
      }

      if (!valido) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span>Entrando...';
      erroGeral.classList.remove('show');

      try {
        await Auth.login(email, senha);
        window.location.href = 'index.html';
      } catch (err) {
        erroGeral.textContent = 'E-mail ou senha incorretos. Tente novamente.';
        erroGeral.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }
  </script>

</body>
</html>
